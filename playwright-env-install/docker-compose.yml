x-common: &common
  build: 
    context: .
    dockerfile: Dockerfile
    args:
      - PW_VERSION=${PW_VERSION}
  init: true  # SysFlag (PID 1) No zomby
  ipc: host # Recommended for Chtomium repair leack of memory
  restart: unless-stopped
  working_dir: /app
  environment:
    - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright ##
  volumes:
    - ./shared:/app/shared # Common folder for devs
#    - playwright_browsers:/ms-playwright ##

services:
  dev1:
    <<: *common
    container_name: playwright_dev1
    ports:
      - "2221:22"
    volumes:
      - ./dev1:/app
      - ./shared:/app/shared
      - playwright_browsers:/ms-playwright # folder with browsers, common for all DONT USE Template

  dev2:
    <<: *common
    container_name: playwright_dev2
    ports:
      - "2222:22"
    volumes:
      - ./dev2:/apз
      - ./shared:/app/shared
      - playwright_browsers:/ms-playwright


volumes:
  playwright_browsers:
    external: true
