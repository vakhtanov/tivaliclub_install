apiVersion: 1

providers:
  - name: 'Default'
    orgId: 1
    folder: 'Infrastructure' # В какой папке в Grafana будет лежать
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10 # Как часто проверять обновления файлов
    options:
      path: /var/lib/grafana/dashboards # Путь ВНУТРИ контейнера
